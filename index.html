<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>

    <style type="text/css">
        /* Import Modern Fonts */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

/* Global Variables */
:root {
  --primary: #6366f1;
  --primary-dark: #4f46e5;
  --secondary: #ec4899;
  --accent: #06b6d4;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --dark: #0f172a;
  --card-bg: rgba(15, 23, 42, 0.95);
  --glass: rgba(255, 255, 255, 0.08);
  --glass-border: rgba(255, 255, 255, 0.12);
  --text-primary: #f8fafc;
  --text-secondary: #cbd5e1;
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -2px rgb(0 0 0 / 0.05);
  --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 10px 10px -5px rgb(0 0 0 / 0.04);
}

/* Background Scene */
body {
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
  min-height: 100vh;
  padding: 2rem;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-image: 
    radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
    radial-gradient(circle at 40% 40%, rgba(120, 219, 255, 0.2) 0%, transparent 50%);
  z-index: -1;
  animation: float 20s ease-in-out infinite;
}

/* Main Calculator Container */
.cardCal {
  background: var(--card-bg);
  backdrop-filter: blur(24px) saturate(180%);
  border-radius: 32px;
  border: 1px solid var(--glass-border);
  padding: 3rem 2.5rem;
  max-width: 450px;
  margin: 0 auto;
  box-shadow: 
    var(--shadow-xl),
    inset 0 1px 0 rgba(255, 255, 255, 0.05),
    0 0 60px rgba(99, 102, 241, 0.15);
  position: relative;
  overflow: hidden;
  transform: translateY(0);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.cardCal::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
  border-radius: 32px 32px 0 0;
}

.cardCal::after {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: conic-gradient(from 0deg, transparent 0deg, rgba(99, 102, 241, 0.03) 60deg, transparent 120deg);
  animation: rotate 15s linear infinite;
  z-index: -1;
}

.cardCal:hover {
  transform: translateY(-8px);
  box-shadow: 
    0 32px 64px rgba(0, 0, 0, 0.2),
    inset 0 1px 0 rgba(255, 255, 255, 0.08),
    0 0 80px rgba(99, 102, 241, 0.25);
}

/* Title */
.title {
  font-family: 'Inter', sans-serif;
  font-size: clamp(1.75rem, 4vw, 2.25rem);
  font-weight: 800;
  text-align: center;
  background: linear-gradient(135deg, var(--text-primary), var(--primary), var(--secondary));
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 2.5rem;
  letter-spacing: -0.025em;
  line-height: 1.2;
  position: relative;
}

.title::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--secondary));
  border-radius: 2px;
  animation: pulse 2s ease-in-out infinite;
}

/* Input Sections */
.num1, .num2 {
  font-family: 'Inter', sans-serif;
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

/* Input Fields */
.inputA, .inputB {
  width: 100%;
  padding: 1.25rem 1.5rem;
  background: var(--glass);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.125rem;
  font-weight: 500;
  text-align: center;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  margin-bottom: 1.5rem;
  position: relative;
  outline: none;
}

.inputA:focus, .inputB:focus {
  background: rgba(255, 255, 255, 0.12);
  border-color: var(--primary);
  box-shadow: 
    0 0 0 3px rgba(99, 102, 241, 0.1),
    var(--shadow-lg);
  transform: translateY(-2px);
}

.inputA::placeholder, .inputB::placeholder {
  color: var(--text-secondary);
  opacity: 0.6;
}

/* Result Section */
.cardCal > div > div:nth-child(3) p:first-child {
  font-family: 'Inter', sans-serif;
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

#ans {
  background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(6, 182, 212, 0.1));
  backdrop-filter: blur(12px);
  border: 1px solid rgba(16, 185, 129, 0.2);
  border-radius: 20px;
  padding: 1.5rem;
  min-height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--success);
  margin-bottom: 2rem;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

#ans::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(16, 185, 129, 0.1), transparent);
  transition: left 0.6s ease;
}

#ans:hover::before {
  left: 100%;
}

/* Button Containers */
.btn2 {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1rem;
  margin-bottom: 1.5rem;
}

.btn3 {
  display: flex;
  justify-content: center;
}

/* Base Button Styling */
.btn {
  background: var(--glass);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: 18px;
  padding: 1rem;
  font-family: 'Inter', sans-serif;
  font-size: 1.125rem;
  font-weight: 600;
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  min-height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  text-decoration: none;
  outline: none;
}

.btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
  opacity: 0;
  transition: opacity 0.3s ease;
  border-radius: 18px;
}

.btn:hover::before {
  opacity: 1;
}

.btn:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow: var(--shadow-lg);
  border-color: rgba(255, 255, 255, 0.2);
}

.btn:active {
  transform: translateY(0) scale(0.98);
  transition: all 0.1s ease;
}

/* Specific Button Colors */
.btn2 .btn:nth-child(1) { /* Add */
  background: linear-gradient(135deg, var(--success), #059669);
  border: 1px solid rgba(16, 185, 129, 0.3);
  color: white;
}

.btn2 .btn:nth-child(1):hover {
  box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
}

.btn2 .btn:nth-child(2) { /* Subtract */
  background: linear-gradient(135deg, var(--danger), #dc2626);
  border: 1px solid rgba(239, 68, 68, 0.3);
  color: white;
}

.btn2 .btn:nth-child(2):hover {
  box-shadow: 0 8px 25px rgba(239, 68, 68, 0.3);
}

.btn2 .btn:nth-child(3) { /* Divide */
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border: 1px solid rgba(99, 102, 241, 0.3);
  color: white;
}

.btn2 .btn:nth-child(3):hover {
  box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3);
}

.btn2 .btn:nth-child(4) { /* Multiply */
  background: linear-gradient(135deg, var(--secondary), #db2777);
  border: 1px solid rgba(236, 72, 153, 0.3);
  color: white;
}

.btn2 .btn:nth-child(4):hover {
  box-shadow: 0 8px 25px rgba(236, 72, 153, 0.3);
}

/* Clear Button */
#clear {
  background: linear-gradient(135deg, var(--warning), #d97706);
  border: 1px solid rgba(245, 158, 11, 0.3);
  color: white;
  min-width: 140px;
  font-weight: 700;
}

#clear:hover {
  box-shadow: 0 8px 25px rgba(245, 158, 11, 0.3);
}

/* Animations */
@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes float {
  0%, 100% { transform: translateY(0px) rotate(0deg); }
  33% { transform: translateY(-30px) rotate(120deg); }
  66% { transform: translateY(-20px) rotate(240deg); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: translateX(-50%) scaleX(1); }
  50% { opacity: 0.5; transform: translateX(-50%) scaleX(1.5); }
}

/* Responsive Design */
@media (max-width: 640px) {
  body { padding: 1rem; }
  
  .cardCal {
    padding: 2rem 1.5rem;
    margin: 0;
    max-width: none;
  }
  
  .btn2 {
    grid-template-columns: repeat(2, 1fr);
    gap: 0.75rem;
  }
  
  .btn {
    min-height: 48px;
    font-size: 1rem;
    padding: 0.875rem;
  }
  
  .inputA, .inputB {
    padding: 1rem 1.25rem;
    font-size: 1rem;
  }
  
  #ans {
    padding: 1.25rem;
    font-size: 1.25rem;
  }
}

/* Dark mode enhancements */
@media (prefers-color-scheme: dark) {
  .cardCal {
    box-shadow: 
      var(--shadow-xl),
      inset 0 1px 0 rgba(255, 255, 255, 0.08),
      0 0 80px rgba(99, 102, 241, 0.2);
  }
}

        

        




        




</style>


</head>
<body >



    <div class="cardCal">
        <p class="title">Simple Calculator</p>
        <div>
            <div>
                <p class="num1">Number A:</p>
                <input class="inputA" type="number" id="numA">
            </div>
            <div>
                <p class="num2">Number B:</p>
                <input class="inputB" type="number" id = "numB">

            </div>
            <div>
                <p> Result :</p>
                <p id="ans"></p>
            </div>
            <div class="btn2">
                <button id="Add" class="btn btn btn-primary">+</button>
                <button id="Sub" class="btn btn btn-primary">-</button>
                <button id="Division" class="btn btn btn-primary">/</button>
                <button id="Multi" class="btn btn btn-primary">×</button>

                
            </div>
            <div class="btn3">
                <button id="clear" class="btn btn btn-primary">Clear</button>
            </div>
            
            
        </div>
    </div>

    <script type="text/javascript">

  

        document.getElementById("Add").onclick = function(){
            let X = document.getElementById("numA").value;
            let Y = document.getElementById("numB").value;

            if( X == "" || Y == ""){
                alert ("Please Enter The Numbers");
            }

            else {
                let numX = parseInt(X);
                let numY = parseInt(Y);
                let sum = numX + numY;
                document.getElementById("ans").innerHTML = sum; 
            }
            
        }

        document.getElementById("Sub").onclick = function(){
            let X = document.getElementById("numA").value;
            let Y = document.getElementById("numB").value;

            if( X == "" || Y == ""){
                alert ("Please Enter The Numbers");
            }

            else {
                let numX = parseInt(X);
                let numY = parseInt(Y);
                let sum = numX - numY;
                document.getElementById("ans").innerHTML = sum; 
            }


        }
        document.getElementById("Division").onclick = function(){
            let X = document.getElementById("numA").value;
            let Y = document.getElementById("numB").value;


            if( X == "" || Y == ""){
                alert ("Please Enter The Numbers");
            }

            else {
                let numX = parseInt(X);
                let numY = parseInt(Y);
                let sum = numX / numY;
                document.getElementById("ans").innerHTML = sum; 
            }

        }
        document.getElementById("Multi").onclick = function(){
            let X = document.getElementById("numA").value;
            let Y = document.getElementById("numB").value;

            if( X == "" || Y == ""){
                alert ("Please Enter The Numbers");
            }

            else {
                let numX = parseInt(X);
                let numY = parseInt(Y);
                let sum = numX * numY;
                document.getElementById("ans").innerHTML = sum; 
            }



            
        }
        
        document.getElementById("clear").onclick = function(){
            document.getElementById("numA").value="";
            document.getElementById("numB").value="";
            document.getElementById("ans").innerHTML ="";
            
        }

        
    </script>

    






    





            


        



    </script>
