<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type = "text" id="textinput">
    <button id="textchange"> update </button>
    <p id = textp> There is a Text </p>
    <script type="text/javascript">

        

        document.getElementById("textchange").onclick = function(){

            var textEntered = ""

            textEntered = document.getElementById("textinput").value;

            document.getElementById("textp").innerHTML =  document.getElementById("textp").innerHTML + (textEntered);



        }



    </script>
    
</body>
</html>
